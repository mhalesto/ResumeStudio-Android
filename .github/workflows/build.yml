name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # The parity suite needs no device: it is why :core:model is a plain JVM
      # module. A template added on iOS and not regenerated here fails right here.
      - name: Parity suite
        run: ./gradlew :core:model:test

      - name: Assemble
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
